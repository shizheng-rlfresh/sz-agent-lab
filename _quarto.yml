project:
  type: book
  output-dir: _book

book:
  title: "Agentic Systems Lab"
  subtitle: "Building, Measuring, and Hardening AI Agents"
  author: "Zheng Shi"
  description: "A hands-on technical book and deterministic Python lab for building, tracing, evaluating, hardening, and reasoning about agentic AI systems."
  keyword: "AI agents, agentic systems, LLM systems, evals, tracing, tool policy, prompt injection"
  site-url: "https://agent-book.zhengqxhs.com/"
  repo-url: "https://github.com/shizheng-rlfresh/sz-agent-lab"
  repo-actions: [source, issue]
  page-footer:
    center: "Copyright 2026 Zheng Shi. Licensed under MIT."
    right:
      - text: "Source"
        href: "https://github.com/shizheng-rlfresh/sz-agent-lab"
      - text: "Issues"
        href: "https://github.com/shizheng-rlfresh/sz-agent-lab/issues"
  chapters:
    - index.qmd
    - part: "Part I — Foundations"
      chapters:
        - chapters/01-from-llm-calls-to-agentic-systems.qmd
        - chapters/02-workflows-before-agents.qmd
    - part: "Part II — Tools, State, and Runtime"
      chapters:
        - chapters/03-designing-tools.qmd
        - chapters/04-state-memory-and-context.qmd
        - chapters/05-building-the-repo-triage-agent.qmd
    - part: "Part III — Measurement"
      chapters:
        - chapters/06-tracing-runtime-evidence.qmd
        - chapters/07-evaluating-agents.qmd
        - chapters/08-reports-production-evidence.qmd
    - part: "Part IV — Safety and Hardening"
      chapters:
        - chapters/09-guardrails-and-tool-policy.qmd
        - chapters/10-prompt-injection-untrusted-tool-output.qmd
    - part: "Part V — Infra and Cost"
      chapters:
        - chapters/11-context-cost-and-inference.qmd
        - chapters/12-prompt-caching-prefix-stability.qmd
        - chapters/13-local-agents-with-mlx.qmd
    - part: "Part VI — Deployment and Capstone"
      chapters:
        - chapters/14-production-readiness.qmd
        - chapters/15-capstone-agentprobe.qmd
  appendices:
    - appendices/further-reading.qmd
    - appendices/glossary.qmd
    - appendices/command-reference.qmd
    - appendices/trace-schema.qmd
    - appendices/eval-schema.qmd
    - appendices/tool-policy-schema.qmd
    # - appendices/evidence-reference-policy.qmd

bibliography: references.bib

format:
  html:
    theme: cosmo
    css: styles/html.css
    toc: true
    toc-title: Contents
    toc-depth: 2
    number-sections: true
    number-depth: 1
    code-copy: true
